name: Tests

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

# See ARCHITECTURE.md §11 Week 1: "Инициализация проекта (структура, конфиг, CI)"

jobs:
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y sqlite3 libsqlite3-dev

      - name: Download Go modules
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Run go vet
        run: go vet ./...

      - name: Run unit tests
        run: |
          CGO_ENABLED=1 go test \
            -short \
            -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            ./...
        env:
          MEMORYHUB_SYSTEM_ENVIRONMENT: test
          MEMORYHUB_SYSTEM_LOG_LEVEL: warn

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: success()
        with:
          file: coverage.out
          fail_ci_if_error: false

      - name: Run integration tests
        run: |
          # Initialize test database
          mkdir -p ./data
          for f in ./db/migrations/*.sql; do
            sqlite3 ./data/memoryhub-test.sqlite < "$f"
          done

          CGO_ENABLED=1 go test \
            -v \
            -run Integration \
            ./tests/...
        env:
          MEMORYHUB_DB_FILE: ./data/memoryhub-test.sqlite
          MEMORYHUB_SYSTEM_ENVIRONMENT: test

