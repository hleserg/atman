name: Translate Stale RU Blocks

on:
  workflow_dispatch:
    inputs:
      only_stale:
        description: "Only translate stale blocks (true/false)"
        default: "true"
        required: false
  schedule:
    # Run weekly on Monday at 09:00 UTC
    - cron: "0 9 * * 1"

jobs:
  translate:
    name: Translate stale RU codemap blocks
    runs-on: ubuntu-latest
    # Only run on main branch (not PRs)
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install project
        run: uv pip install --system -e ".[dev]"

      - name: Flag stale RU blocks
        run: python -m scripts.codemap flag-stale-ru

      - name: Translate stale blocks
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ONLY_STALE: ${{ inputs.only_stale }}
        run: |
          STALE_FLAG=$([[ "$ONLY_STALE" != "false" ]] && echo "--only-stale" || echo "")
          python -m scripts.codemap translate --lang ru $STALE_FLAG

      - name: Commit translated blocks
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(ru): auto-translate stale codemap blocks"
          file_pattern: "docs/architecture/SYSTEM_MAP-ru.md README-ru.md .codemap/en_hashes.json"
