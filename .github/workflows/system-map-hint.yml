name: ūüóļÔłŹ SYSTEM_MAP Update Hints

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "src/atman/**/*.py"
      - "tests/**/*.py"

concurrency:
  group: sysmap-hint-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  models: read
  pull-requests: write
  contents: read

jobs:
  sysmap-hint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build prompt
        run: |
          git diff origin/${{ github.base_ref }}...HEAD | head -c 8000 > diff.txt

          # Changed files in src/atman/ and tests/
          SRC_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep "^src/atman/.*\.py$" | head -20 | tr '\n' ' ')
          TEST_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD \
            | grep "^tests/.*\.py$" | head -10 | tr '\n' ' ')

          echo "SRC_FILES=$SRC_FILES" >> $GITHUB_ENV
          echo "TEST_FILES=$TEST_FILES" >> $GITHUB_ENV

          python3 - <<'EOF'
          import os

          src  = os.environ.get("SRC_FILES", "").strip()
          test = os.environ.get("TEST_FILES", "").strip()

          with open("diff.txt") as f:
              diff = f.read()

          # Read current SYSTEM_MAP if it exists
          try:
              with open("docs/architecture/SYSTEM_MAP.md") as f:
                  sysmap = f.read()[:4000]
          except FileNotFoundError:
              sysmap = "(SYSTEM_MAP.md not found yet)"

          prompt = f"""Changed src/atman/ files:
          {src or "(none)"}

          Changed tests/ files:
          {test or "(none)"}

          Diff:
          {diff}

          Current SYSTEM_MAP.md (truncated):
          {sysmap}

          ---

          SYSTEM_MAP.md sections:
          ¬ß1 Modules        ‚ÄĒ all modules, their public classes/functions
          ¬ß2 Integrations   ‚ÄĒ service‚ÜĒport links, CLI‚ÜĒservice links
          ¬ß3 Scenarios      ‚ÄĒ user scenarios A‚ÄďG
          ¬ß4 Edge cases     ‚ÄĒ unhandled inputs, known gaps
          ¬ß5 Regressions    ‚ÄĒ known bugs + regression test references

          Suggest exactly which entries need to be added, updated, or removed.
          Format:
          **¬ßN ‚ÄĒ Section Name**
          - ADD / UPDATE / REMOVE: `Name` ‚ÄĒ reason

          Only include sections that actually need updating.
          End with one line verdict: ūüüĘ Minor / ūüü° Moderate / ūüĒī Major update required
          Then one line: does SYSTEM_MAP-ru.md also need syncing? (yes/no + reason)
          """

          with open("prompt.txt", "w") as f:
              f.write(prompt)
          EOF

      - name: Run AI analysis
        id: ai
        continue-on-error: true          # –Ĺ–Ķ –Ņ–į–ī–į–Ķ–ľ –Ķ—Ā–Ľ–ł GitHub Models –Ĺ–Ķ–ī–ĺ—Ā—ā—É–Ņ–Ķ–Ĺ
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o-mini
          system-prompt-file: .github/prompts/sysmap-system.txt
          prompt-file: ./prompt.txt
          output-file: ./ai-response.txt

      - name: Build comment
        run: |
          SRC_BADGE="${{ env.SRC_FILES }}"

          # Fallback –Ķ—Ā–Ľ–ł AI —ą–į–≥ —É–Ņ–į–Ľ –ł —Ą–į–Ļ–Ľ –Ĺ–Ķ —Ā–ĺ–∑–ī–į–Ľ—Ā—Ź
          if [ ! -s ai-response.txt ]; then
            echo "‚ö†ÔłŹ AI analysis unavailable (GitHub Models step failed). Run manually or retry." > ai-response.txt
          fi

          cat > comment.md << EOF
          <!-- atman-sysmap-hint -->
          ## ūüóļÔłŹ SYSTEM_MAP Update Hints

          Changed files: \`${SRC_BADGE:-"(tests only)"}\`

          EOF

          cat ai-response.txt >> comment.md

          cat >> comment.md << 'EOF'

          > **Reminder (¬ß26.1):** update SYSTEM_MAP in the **same PR** as the code. Then sync `SYSTEM_MAP-ru.md`.

          ---
          *Auto-generated ¬∑ [standard ¬ß26](docs/development/DEVELOPMENT_STANDARD.md)*
          EOF

      - name: Find existing comment
        uses: peter-evans/find-comment@v3
        id: find
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: "<!-- atman-sysmap-hint -->"

      - name: Post or update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: comment.md
          edit-mode: replace
