name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install SQLite dev
        run: sudo apt-get install -y libsqlite3-dev

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=5m

      - name: Check go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || \
            (echo "go.mod is not tidy — run 'make tidy'" && exit 1)

      - name: Check formatting
        run: |
          gofmt -l . | grep -v vendor | tee /tmp/gofmt.out
          if [ -s /tmp/gofmt.out ]; then
            echo "Files not formatted:"
            cat /tmp/gofmt.out
            echo "Run 'make fmt'"
            exit 1
          fi
